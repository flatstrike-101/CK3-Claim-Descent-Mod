l_english:
 game_concept_modu_chanyu:0 "Modu Chanyu"
 game_concept_modu_chanyu_desc:0 "Modu was born to Touman of the Luandi clan around the year 234 BCE. He was the eldest son of Touman and served as a military commander under him, but Modu was not seen as a competent enough successor to Touman. Modu killed his father around 209 BCE, securing his position as his father's successor. Modu would unite much of the eastern Steppe under his name, becoming the first Chanyu of the Xiongnu Empire, which would stretch across Central Asia, posing a real threat to the Chinese."
 game_concept_chanyu:0 "Chanyu"
 game_concept_chanyu_desc:0 "The title of Chengli Gutu Chanyu, shortened as just Chanyu, was the title used by nomads of the central Asian steppe to refer to their supreme ruler. The title of Chanyu was used commonly to refer to the leader of the Xiongnu Empire, over time however the usage of Chanyu would decline and eventually it would be replaced by the titles Khan and Khagan by the 5th century AD."
 game_concept_xiongnu:0 "Xiongnu"
 game_concept_xiongnu_desc:0 "The Xiongnu were a confederation of nomadic tribes that dominated the eastern steppe from the 3rd century BCE to the 1st centuury AD. Just like nomads of the middle ages, the Xiongnu were expert horsemen and archers. They would frequently raid the Chinese under the Qin and later the Han dynasties, leading to extensive upgrades to the Great Wall of China. The Xiongnu Empire is recognized as the first true empire of the steppe, and it would lay the foundations for several other Khaganates to come."
 game_concept_turkic_peoples:0 "Turkic Peoples"
 game_concept_turkic_peoples_desc:0 "The Turkic Peoples were a collection of many different peoples that all spoke similar languages and shared a similar way of life, the pastoral life. Just like all nomads, they were always migrating, in hopes of finding the perfect pastureland for their herd."
 game_concept_mongol_tribes:0 "Mongol Tribes"
 game_concept_mongol_tribes_desc:0 "The Mongolic peoples were a people native to the eastern steppe, just like the Turks and other nomads, the Monglic Tribes focused on their herd and their pasturelands. They were considered a waring culture, and were very well known for their fierce horse archers."